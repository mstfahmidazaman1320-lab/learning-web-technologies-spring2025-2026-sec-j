<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe</title>

<style>

body{
text-align:center;
font-family:Arial;
}

.board{
display:grid;
grid-template-columns:repeat(3,100px);
gap:5px;
justify-content:center;
margin:20px;
}

.cell{
width:100px;
height:100px;
border:2px solid black;
font-size:40px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.winner{
background:yellow;
}

</style>
</head>

<body>

<h1>Tic Tac Toe</h1>

<h3 id="status">Player X Turn</h3>

<div class="board">
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>
</div>

<button onclick="resetGame()">Reset</button>

<script>

let cells = document.querySelectorAll(".cell");
let status = document.getElementById("status");

let currentPlayer = "X";
let gameActive = true;

const winPatterns = [
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8],
[0,4,8],
[2,4,6]
];

cells.forEach((cell,index)=>{

cell.addEventListener("click",function(){

if(cell.textContent !== "" || !gameActive){
return;
}

cell.textContent=currentPlayer;

checkWinner();

});

});

function checkWinner(){

for(let pattern of winPatterns){

let a=cells[pattern[0]].textContent;
let b=cells[pattern[1]].textContent;
let c=cells[pattern[2]].textContent;

if(a!=="" && a===b && b===c){

status.textContent="Player "+currentPlayer+" Wins!";
gameActive=false;

cells[pattern[0]].classList.add("winner");
cells[pattern[1]].classList.add("winner");
cells[pattern[2]].classList.add("winner");

return;
}

}

let draw=true;

cells.forEach(cell=>{
if(cell.textContent===""){
draw=false;
}
});

if(draw){
status.textContent="It's a Draw!";
gameActive=false;
return;
}

currentPlayer = currentPlayer==="X" ? "O" : "X";

status.textContent="Player "+currentPlayer+" Turn";

}

function resetGame(){

cells.forEach(cell=>{
cell.textContent="";
cell.classList.remove("winner");
});

currentPlayer="X";
gameActive=true;

status.textContent="Player X Turn";

}

</script>

</body>
</html>
