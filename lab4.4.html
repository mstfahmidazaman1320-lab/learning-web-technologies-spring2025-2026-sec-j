<!DOCTYPE html>
<html>
<head>
    <title>Degree Validation</title>
</head>
<body>

<h2>Degree</h2>

<form onsubmit="return validateDegree()">

    <input type="checkbox" name="degree" value="SSC"> SSC
    <input type="checkbox" name="degree" value="HSC"> HSC
    <input type="checkbox" name="degree" value="BSc"> BSc

    <br><br>
    <span id="error" style="color:red;"></span>
    <br><br>

    <input type="submit" value="Submit">

</form>

<script>
function validateDegree() {

    let degrees = document.getElementsByName("degree");
    let error = document.getElementById("error");
    let selected = false;

    for (let i = 0; i < degrees.length; i++) {
        if (degrees[i].checked) {
            selected = true;
            break;
        }
    }

    if (!selected) {
        error.innerHTML = "Please select at least one degree";
        return false;
    }

    error.innerHTML = "";
    alert("Degree selected successfully!");
    return true;
}
src="script.js"
</script>

</body>
</html>
